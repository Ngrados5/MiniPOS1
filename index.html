<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini POS</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <h1>Sistema Web de Facturación (Mini POS)</h1>

    <label>Nombre: <input type="text" id="nombre"></label>
    <label>Precio: <input type="number" id="precio"></label>
    <label>Cantidad: <input type="number" id="cantidad"></label>
    <button onclick="agregarProducto()">Agregar Producto</button>

    <h2>Carrito</h2>
    <table id="carrito">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3 id="totales"></h3>

    <label>Cupón: <input type="text" id="cupon"></label>
    <button onclick="aplicarDescuento()">Aplicar Cupón</button>

    <script src="script.js"></script>
</body>
</html>
